{{- if and .Values.enabled .Values.httpRoutes }}
{{- $outer := . -}}
{{- $routes := .Values.httpRoutes -}}
{{- if $routes }}
{{- $defaultParentRefs := .Values.defaultParentRefs | default (list) -}}
{{- range $idx, $route := (ternary $routes (list $routes) (kindIs "slice" $routes)) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ default (include "gateway-api.fullname" $outer) $route.name }}{{ coalesce $route.nameSuffix $idx "" }}
  labels:
    {{- include "gateway-api.labels" $outer | nindent 4 }}
    {{- with $route.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- $parentRefs := (or $route.parentRefs $defaultParentRefs) -}}
  {{- with $parentRefs }}
  parentRefs:
    {{- range . }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
      {{- if .kind }}
      kind: {{ .kind }}
      {{- end }}
      {{- if .group }}
      group: {{ .group }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- with $route.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- with $route.rules }}
  rules:
    {{- range . }}
    - {{- with .matches }}
      matches:
        {{- range . }}
        - {{- with .path }}
          path:
            {{- if .type }}
            type: {{ .type }}
            {{- end }}
            {{- if .value }}
            value: {{ .value | quote }}
            {{- end }}
          {{- end }}
          {{- with .headers }}
          headers:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- range . }}
        - {{- if .type }}
          type: {{ .type }}
          {{- end }}
          {{- if eq .type "RequestRedirect" }}
          {{- with .requestRedirect }}
          requestRedirect:
            {{- if .scheme }}
            scheme: {{ .scheme | quote }}
            {{- end }}
            {{- if .hostname }}
            hostname: {{ .hostname | quote }}
            {{- end }}
            {{- if .path }}
            {{- with .path }}
            path:
              {{- if .type }}
              type: {{ .type }}
              {{- end }}
              {{- if .replaceFullPath }}
              replaceFullPath: {{ .replaceFullPath | quote }}
              {{- end }}
              {{- if .replacePrefixMatch }}
              replacePrefixMatch: {{ .replacePrefixMatch | quote }}
              {{- end }}
            {{- end }}
            {{- end }}
            {{- if .port }}
            port: {{ .port }}
            {{- end }}
            {{- if .statusCode }}
            statusCode: {{ .statusCode }}
            {{- end }}
          {{- end }}
          {{- end }}
          {{- if eq .type "ResponseHeaderModifier" }}
          {{- with .responseHeaderModifier }}
          responseHeaderModifier:
            {{- with .add }}
            add:
              {{- range . }}
              - name: {{ .name | quote }}
                value: {{ .value | quote }}
              {{- end }}
            {{- end }}
            {{- with .set }}
            set:
              {{- range . }}
              - name: {{ .name | quote }}
                value: {{ .value | quote }}
              {{- end }}
            {{- end }}
            {{- with .remove }}
            remove:
              {{- range . }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- end }}
          {{- if eq .type "RequestHeaderModifier" }}
          {{- with .requestHeaderModifier }}
          requestHeaderModifier:
            {{- with .add }}
            add:
              {{- range . }}
              - name: {{ .name | quote }}
                value: {{ .value | quote }}
              {{- end }}
            {{- end }}
            {{- with .set }}
            set:
              {{- range . }}
              - name: {{ .name | quote }}
                value: {{ .value | quote }}
              {{- end }}
            {{- end }}
            {{- with .remove }}
            remove:
              {{- range . }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .backendRefs }}
      backendRefs:
        {{- range . }}
        - name: {{ .name }}
          {{- if .namespace }}
          namespace: {{ .namespace }}
          {{- end }}
          {{- if .port }}
          port: {{ .port }}
          {{- end }}
          {{- if .weight }}
          weight: {{ .weight }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
