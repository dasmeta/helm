{{- if .Values.istio.peerAuthentications }}
{{- $outer := . -}}
{{- $policies := .Values.istio.peerAuthentications -}}
{{- if $policies }}
{{- range $idx, $policy := (ternary $policies (list $policies) (kindIs "slice" $policies)) }}
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ default (printf "%s-peer-auth-%d" (include "gateway-api.fullname" $outer) $idx) $policy.name }}
  namespace: {{ default "istio-system" (default $policy.namespace $outer.Release.Namespace) | quote }}
  labels:
    {{- include "gateway-api.labels" $outer | nindent 4 }}
    {{- with $policy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $policy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $policy.selector }}
  selector:
    {{- with $policy.selector.matchLabels }}
    matchLabels:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- if $policy.mtls }}
  mtls:
    {{- if $policy.mtls.mode }}
    mode: {{ $policy.mtls.mode | quote }}
    {{- end }}
  {{- end }}
  {{- with $policy.portLevelMtls }}
  portLevelMtls:
    {{- range $port, $mtls := . }}
    {{ $port }}:
      mode: {{ $mtls.mode | quote }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
