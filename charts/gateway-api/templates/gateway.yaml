{{- if .Values.gateways }}
{{- $outer := . -}}
{{- $gateways := .Values.gateways -}}
{{- if $gateways }}
{{- range $idx, $gateway := (ternary $gateways (list $gateways) (kindIs "slice" $gateways)) }}
{{- $useParams := false }}
{{- with $gateway.infrastructure }}
{{- with .parameters }}
{{- $params := . }}
{{- range $k := list "service" "deployment" "serviceAccount" "horizontalPodAutoscaler" "podDisruptionBudget" }}
{{- if hasKey $params $k }}
{{- $v := index $params $k }}
{{- if or (not (kindIs "string" $v)) (ne $v "") }}
{{- $useParams = true }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- $baseName := default (include "gateway-api.fullname" $outer) $gateway.name }}
{{- $gatewayName := printf "%s%s" $baseName (default "" $gateway.nameSuffix) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  namespace: {{ default "istio-system" (default $gateway.namespace $outer.Release.Namespace) | quote }}
  labels:
    {{- include "gateway-api.labels" $outer | nindent 4 }}
    {{- with $gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ default "istio" $gateway.gatewayClassName | quote }}
  {{- with $gateway.addresses }}
  addresses:
    {{- range . }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- with $gateway.listeners }}
  listeners:
    {{- range . }}
    {{- $protocol := default "HTTP" .protocol }}
    {{- $port := default 80 .port }}
    {{- $hostname := .hostname | default "" }}
    {{- if .name }}
    - name: {{ .name | quote }}
    {{- else }}
    {{- $hostnameSanitized := $hostname | replace "." "-" | replace "*" "wildcard" }}
    {{- if not $hostnameSanitized }}
    {{- $hostnameSanitized = "default" }}
    {{- end }}
    {{- $protocolLower := $protocol | lower }}
    {{- $generatedName := printf "%s-%v-%s" $protocolLower $port $hostnameSanitized }}
    {{- $nameLength := len $generatedName }}
    {{- if gt $nameLength 63 }}
    {{- $generatedName = printf "%.63s" $generatedName }}
    {{- end }}
    - name: {{ $generatedName | quote }}
    {{- end }}
      {{- if $hostname }}
      hostname: {{ $hostname | quote }}
      {{- end }}
      port: {{ $port }}
      protocol: {{ $protocol | quote }}
      {{- if or (eq (lower $protocol) "https") (eq (lower $protocol) "tls") }}
      {{- if kindIs "invalid" .tls }}
      tls:
        mode: Terminate
        certificateRefs:
        - name: {{ $gatewayName }}-tls
          kind: Secret
          group: ""
      {{- else if empty .tls }}
      {{- else }}
      tls:
        {{- toYaml .tls | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if .allowedRoutes }}
      allowedRoutes:
        {{- toYaml .allowedRoutes | nindent 8 }}
      {{- else }}
      allowedRoutes:
        namespaces:
          from: "All"
      {{- end }}
    {{- end }}
  {{- end }}
  {{- with $gateway.infrastructure }}
  infrastructure:
    {{- with .annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if $useParams }}
    parametersRef:
      group: ""
      kind: ConfigMap
      name: {{ include "gateway-api.infrastructureConfigMapName" (list $outer $gateway) | quote }}
    {{- else }}
    {{- with .parametersRef }}
    parametersRef:
      {{- if .group }}
      group: {{ .group | quote }}
      {{- end }}
      {{- if .kind }}
      kind: {{ .kind | quote }}
      {{- end }}
      {{- if .name }}
      name: {{ .name | quote }}
    {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
