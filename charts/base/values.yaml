# This config allows to enable custom rollout strategies by using different providers/operators
# right now only flagger (https://flagger.app/) operator supported and tested for canary with nginx
## NOTE for flagger operator:
## - flagger supports several service meshes and ingresses as provider for traffic splitting, and by default we have using nginx here, so you have to check docs and have at least one used for you app
## - you need to have flagger tool/operator already installed to be able to use its crd, this can be done by installing flagger helm https://artifacthub.io/packages/helm/flagger/flagger
## - also there is need to have at least one metric server/provider enabled(it supports) like prometheus as it uses metrics for checking success rates, the flagger helm allows to install prometheus
## - with flagger enabled we disable native kubernetes service as flagger creates/overrides this service
## - with separate installed prometheus operator(not one that comes with flagger helm) the default `request-success-rate` and `request-duration` metrics templates may not work so you may need to create custom metric templates, the canary+nginx+prometheus metric template can be created by using `dasmeta/flagger-metric-template` chart
rolloutStrategy:
  enabled: false
  operator: flagger
  configs: {}
  # here are all supported flagger configs
  # configs:
  #   canaryName: # Custom name for the Flagger Canary resource. Override for Canary name in Flagger notifications, (default: release-name/namespace).
  #   # skipAnalysis: true # do not run analytics and immediately proceed to promotion as soon as we have canary pods running, can be used in case we need promote change without any webhook/metric checks (if canary pod still remain in pending/containerCreating state the immediate deploy will not work and canary may fail)
  #   provider: nginx # the flagger ingress/service-mesh provider (default nginx)
  #   progressDeadlineSeconds: 61 # the maximum time in seconds for the canary deployment to make progress before it is rollback (default 600s)
  #   canaryReadyThreshold: 51 # minimum percentage of canary pods that must be ready before considering canary ready for traffic shifting (default 100)
  #   primaryReadyThreshold: 51 # minimum percentage of primary pods that must be ready before considering primary ready for traffic shifting (default 100)
  #   interval: 11s # schedule interval (default 60s)
  #   threshold: 11 # max number of failed metric checks before rollback (default 10)
  #   maxWeight: 31 # max traffic percentage (0-100) routed to canary (default 30)
  #   stepWeight: 11 # canary increment step percentage (0-100) (default 10)
  #   # min and max replicas count for primary hpa, default to main app hpa, the main app hpa values also being used for canary deploy hpa so we use this options to have custom values for primary hpa
  #   primaryScalerMinReplicas: 3
  #   primaryScalerMaxReplicas: 7
  #   metrics: # metrics template configs to use for identifying if canary deploy handles request normally, the `request-success-rate` and `request-duration` named ones are available by default, and you can create custom metric templates
  #     - name: request-success-rate
  #       # minimum req success rate (non 5xx responses) percentage (0-100)
  #       thresholdRange:
  #         min: 99
  #       interval: 1m
  #     - name: request-duration
  #       # maximum req duration P99, milliseconds
  #       thresholdRange:
  #         max: 500
  #       interval: 1m
  #     # - name: request-success-rate-nginx-custom
  #     #   interval: 1m
  #     #   templateRef:
  #     #     name: request-success-rate-nginx-custom
  #     #     namespace: ingress-nginx
  #     #   # minimum req success rate (non 5xx responses) percentage (0-100)
  #     #   thresholdRange:
  #     #     min: 99
  #     # - name: request-duration-nginx-custom
  #     #   interval: 1m
  #     #   templateRef:
  #     #     name: request-duration-nginx-custom
  #     #     namespace: ingress-nginx
  #     #   # maximum req duration P99, milliseconds
  #     #   thresholdRange:
  #     #     max: 500
  #   webhooks: # (optional) webhooks can be used for load testing before traffic switching to canaries by using `pre-rollout` type and also generating traffic
  #     - name: acceptance-test
  #       type: pre-rollout
  #       url: http://flagger-loadtester.localhost/
  #       timeout: 30s
  #       metadata:
  #         type: bash
  #         cmd: "curl -sd 'test' http://http-echo-canary/ping | grep ping"
  #     - name: load-test
  #       url: http://flagger-loadtester.localhost/
  #       timeout: 5s
  #       metadata:
  #         cmd: "hey -z 1m -q 3 -c 1 http://http-echo.localhost/ping"
  #   alerts: # (optional) alerts allow to setup custom alerting/notify based on flaggers alert provider crd(there is also option to set global alert config with flagger), for more info look https://docs.flagger.app/usage/alerting
  #     - name: "on-call Slack"
  #       severity: error
  #       providerRef:
  #         name: on-call
  #         namespace: ingress-nginx

gatewayApi:
  enabled: false
  # Parent chart information (set when gateway-api is used as subchart)
  # This value adds a label to Kubernetes resources created by gateway-api:
  #   - helm.sh/parent-chart: parent chart name
  # Note: This should match the parent chart's Chart.yaml name (currently "base")
  # Since Helm doesn't support templating in values.yaml, this must be manually set.
  parentChart:
    name: base # Must match Chart.yaml name field
  # Values passed to the gateway-api subchart.
  #
  # This section is the root for the gateway-api chart. The "enabled" flag here
  # controls whether the dependency is rendered (see condition in Chart.yaml).
  #
  # By default Gateway API resources are disabled. To switch from the
  # traditional Ingress to Gateway API you would typically:
  #   - disable base ingress: ingress.enabled: false
  #   - enable gateway-api and define gateways/routes below.
  #
  # Example (minimal):
  # gatewayApi:
  #   enabled: true
  #   gateways:
  #     - name: main
  #       # gatewayClassName defaults to "istio"
  #       # namespace defaults to "istio-system"
  #       listeners:
  #         - hostname: example.com
  #           # name auto-generated as "http-80-example-com" (protocol-port-hostname, truncated to 63 chars)
  #           # port defaults to 80
  #           # protocol defaults to "HTTP"
  #           # allowedRoutes.namespaces.from defaults to "All"
  #   defaultParentRefs:
  #     - name: main
  #       sectionName: http
  #       # namespace defaults to "istio-system"
  #       # kind and group have defaults (Gateway, gateway.networking.k8s.io)
  #   httpRoutes:
  #     - name: base-route
  #       hostnames:
  #         - example.com
  #       rules:
  #         - matches:
  #             - path:
  #                 value: /
  #                 # type defaults to "PathPrefix"
  #           # backendRefs defaults: name=release name, port=80
  #
  # Example with Gateway infrastructure (AWS LoadBalancer configuration):
  # gatewayApi:
  #   enabled: true
  #   gateways:
  #     - name: internal
  #       # gatewayClassName defaults to "istio"
  #       # namespace defaults to "istio-system"
  #       listeners:
  #         - hostname: internal.example.com
  #           # name auto-generated, port defaults to 80, protocol defaults to "HTTP"
  #       infrastructure:
  #         annotations:
  #           # AWS: Create internal LoadBalancer
  #           service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
  #           service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  #     - name: external
  #       # gatewayClassName defaults to "istio"
  #       # namespace defaults to "istio-system"
  #       listeners:
  #         - hostname: external.example.com
  #           # name auto-generated, port defaults to 80, protocol defaults to "HTTP"
  #       infrastructure:
  #         annotations:
  #           # AWS: External LoadBalancer with security groups
  #           service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
  #           service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  #           service.beta.kubernetes.io/aws-load-balancer-security-groups: "sg-12345,sg-67890"
  #
  # Example with simplified 403 response (automatically creates AuthorizationPolicy):
  # gatewayApi:
  #   enabled: true
  #   gateways:
  #     - name: main
  #       # gatewayClassName defaults to "istio"
  #       # namespace defaults to "istio-system"
  #       listeners:
  #         - hostname: example.com
  #           # name auto-generated, port defaults to 80, protocol defaults to "HTTP"
  #   httpRoutes:
  #     - name: base-route
  #       parentRefs:
  #         - name: main
  #           sectionName: base-route
  #           # namespace defaults to "istio-system", kind and group have defaults
  #       hostnames:
  #         - example.com
  #       rules:
  #         # Rule 1: Return 403 for /restricted path (automatically creates AuthorizationPolicy)
  #         - matches:
  #             - path:
  #                 value: /restricted
  #                 # type defaults to "PathPrefix"
  #           directResponse:
  #             status: 403
  #         # Rule 2: Route all other traffic to the service
  #         - matches:
  #             - path:
  #                 value: /
  #                 # type defaults to "PathPrefix"
  #           # backendRefs defaults: name=release name, port=80
  #
  # Example with manual Istio AuthorizationPolicy (advanced use case):
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     defaultTargetRefs:
  #       - name: main
  #         # namespace defaults to "istio-system", kind and group have defaults
  #     authorizationPolicies:
  #       - name: block-admin
  #         # namespace defaults to "istio-system"
  #         # action defaults to "DENY"
  #         # targetRefs uses defaultTargetRefs if not specified
  #         rules:
  #           - to:
  #               - operation:
  #                   paths: ["/admin*"]
  #                   ports: ["80"]
  #
  # Example with simplified HTTPRoute redirects:
  # gatewayApi:
  #   enabled: true
  #   gateways:
  #     - name: main
  #       # gatewayClassName defaults to "istio"
  #       # namespace defaults to "istio-system"
  #       listeners:
  #         - hostname: example.com
  #           # name auto-generated, port defaults to 80, protocol defaults to "HTTP"
  #   # All rules for the same hostname are automatically combined into a single HTTPRoute
  #   httpRoutes:
  #     - name: redirect-example
  #       parentRefs:
  #         - name: main
  #           sectionName: redirect-example
  #           # namespace defaults to "istio-system", kind and group have defaults
  #       hostnames:
  #         - example.com
  #       rules:
  #         # Rule 1: HTTP to HTTPS redirect
  #         - matches:
  #             - path:
  #                 value: /
  #                 # type defaults to "PathPrefix"
  #           redirect:
  #             scheme: https
  #             statusCode: 301
  #         # Rule 2: Path-based redirect: /old-path -> /new-path
  #         - matches:
  #             - path:
  #                 value: /old-path
  #                 # type defaults to "PathPrefix"
  #           redirect:
  #             uri: /new-path
  #             redirectCode: 301
  #         # Rule 3: Normal backend route (no redirect)
  #         - matches:
  #             - path:
  #                 value: /new-path
  #                 # type defaults to "PathPrefix"
  #           # backendRefs defaults: name=release name, port=80
