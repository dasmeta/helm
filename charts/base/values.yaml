#   - external-secret-1
#   - external-secret-2
#   - external-secret-3
#   - external-secret-4
#   - DATABASE:
#       from: helm-test-secret
#       key: database
#   - ENDPOINT:
#       from: helm-test-secret
#       key: endpoint
#   - PASSWORD:
#       from: helm-test-secret
