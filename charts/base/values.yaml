  #     key: TOKEN
  #     name: secret-name
  #   type: Token

podMonitor:
  enabled: false
  interval: 30s
  targetPortName: "http"
  path: /metrics/
  # Optional: override pod label selector if no targets are found (e.g. when using as subchart or job workload).
  # Get labels from pods: kubectl get pods -n <namespace> -o jsonpath='{.items[0].metadata.labels}' | jq
