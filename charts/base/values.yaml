  # ==============================================================================
  # ISTIO-SPECIFIC RESOURCES (gatewayApi.istio.*)
  # ==============================================================================
  # The gateway-api chart supports the following Istio-specific CRDs that extend
  # Gateway API functionality when using Istio as the Gateway implementation:
  #
  # 1. Gateway (networking.istio.io/v1) - Istio's native Gateway resource
  #    - Required when using VirtualService (VirtualService can only reference Istio Gateway)
  #    - Does NOT create LoadBalancer service - uses selector to match existing service
  #    - Default namespace: "istio-system"
  #
  # 2. AuthorizationPolicy (security.istio.io/v1) - Access control
  #    - Deny/allow specific paths, hosts, ports, IPs on Gateway resources
  #    - Can be auto-generated from HTTPRoute rules with directResponse.status: 403
  #    - Default namespace: "istio-system", default action: "DENY"
  #
  # 3. VirtualService (networking.istio.io/v1) - Advanced traffic management
  #    - Traffic routing, fault injection, response manipulation
  #    - Can return custom HTTP status codes (403, 404, etc.), redirects, route to backends
  #    - Default namespace: "istio-system" (recommended to use service namespace)
  #    - IMPORTANT: Do NOT use HTTPRoute for same hostname when using VirtualService
  #
  # 4. PeerAuthentication (security.istio.io/v1) - mTLS configuration
  #    - Configures mutual TLS for services in the mesh
  #    - Default namespace: "istio-system"
  #
  # 5. DestinationRule (networking.istio.io/v1) - Traffic policies
  #    - Load balancing, circuit breakers, connection pooling, TLS settings
  #    - Default namespace: Release.Namespace
  #
  # 6. ServiceEntry (networking.istio.io/v1) - External service registry
  #    - Adds entries to Istio's service registry (external services or manual entries)
  #    - Default namespace: Release.Namespace
  #
  # 7. Sidecar (networking.istio.io/v1) - Sidecar proxy configuration
  #    - Configures sidecar proxy for inbound/outbound communication
  #    - Default namespace: Release.Namespace
  #
  # 8. WorkloadEntry (networking.istio.io/v1) - VM workload integration
  #    - Adds VM workloads to the mesh without sidecar injection
  #    - Default namespace: Release.Namespace
  #
  # 9. WorkloadGroup (networking.istio.io/v1) - VM workload template
  #    - Template for creating WorkloadEntries for VMs
  #    - Default namespace: Release.Namespace
  #
  # 10. RequestAuthentication (security.istio.io/v1) - JWT authentication
  #     - Defines JWT authentication methods for workloads
  #     - Default namespace: Release.Namespace
  #
  # 11. Telemetry (telemetry.istio.io/v1) - Telemetry configuration
  #     - Configures telemetry data generation (metrics, traces, logs)
  #     - Default namespace: Release.Namespace
  #
  # All Istio resources support common attributes:
  #   - name: Resource name (auto-generated if not specified)
  #   - namespace: Resource namespace (see defaults above)
  #   - labels: Additional labels to apply
  #   - annotations: Additional annotations to apply
  #
  # For detailed examples of each resource, see below.
  #
  # Example with Istio PeerAuthentication (mTLS configuration):
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     peerAuthentications:
  #       - name: gateway-mtls
  #         namespace: istio-system
  #         selector:
  #           matchLabels:
  #             istio: ingressgateway
  #         mtls:
  #           mode: STRICT
  #
  # Example with Istio DestinationRule (traffic policies):
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     destinationRules:
  #       - name: backend-policy
  #         host: backend-service
  #         trafficPolicy:
  #           loadBalancer:
  #             simple: LEAST_CONN
  #           connectionPool:
  #             tcp:
  #               maxConnections: 100
  #           outlierDetection:
  #             consecutiveErrors: 3
  #             interval: 30s
  #             baseEjectionTime: 30s
  #
  # Example with Istio Gateway (networking.istio.io/v1) for VirtualService:
  # IMPORTANT: Istio Gateway is different from Kubernetes Gateway API Gateway.
  # VirtualService requires Istio Gateway, not Kubernetes Gateway API Gateway.
  # Istio Gateway does NOT create a LoadBalancer service - it uses a selector to match
  # an existing service. The selector must match a service that already exists.
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     gateways:
  #       - name: virtualservice-gateway
  #         # namespace defaults to "istio-system"
  #         # Option 1: If you have istio-gateway helm chart installed
  #         selector:
  #           istio: ingressgateway
  #         # Option 2: If using only Kubernetes Gateway API Gateway, match the service labels
  #         # selector:
  #         #   gateway.networking.k8s.io/gateway-name: main
  #         servers:
  #           - port:
  #               number: 80
  #               name: http
  #               protocol: HTTP
  #             hosts:
  #               - example.com
  #
  # Example with Istio VirtualService (advanced traffic management, 403/404 responses):
  # VirtualService provides advanced traffic routing, fault injection, and response manipulation.
  # IMPORTANT: When using VirtualService, do NOT use HTTPRoute for the same hostname,
  # as HTTPRoute may take precedence and prevent VirtualService rules from being applied.
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     gateways:
  #       - name: virtualservice-gateway
  #         selector:
  #           istio: ingressgateway
  #         servers:
  #           - port:
  #               number: 80
  #               name: http
  #               protocol: HTTP
  #             hosts:
  #               - example.com
  #     virtualServices:
  #       - name: status-code-handler
  #         # namespace defaults to "istio-system" (recommended to use service namespace)
  #         hosts:
  #           - example.com
  #         gateways:
  #           - istio-system/virtualservice-gateway
  #         http:
  #           # Rule 1: Return 403 for /restricted path
  #           - match:
  #               - uri:
  #                   prefix: /restricted
  #             directResponse:
  #               status: 403
  #               # ports: # default ports are "80" and "443", but can be overridden
  #               #   - "80"
  #               #   - "443"
  #           # Rule 2: 301 redirect from /old-path to /new-path
  #           - match:
  #               - uri:
  #                   prefix: /old-path
  #             redirect:
  #               uri: /new-path
  #               authority: example.com
  #               redirectCode: 301
  #           # Rule 4: Route to backend service
  #           - match:
  #               - uri:
  #                   prefix: /
  #             route:
  #               - destination:
  #                   host: backend-service  # Use short service name if in same namespace
  #                   port:
  #                     number: 80
  #
  # Example with Istio ServiceEntry (add external services to mesh):
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     serviceEntries:
  #       - name: external-api
  #         # namespace defaults to Release.Namespace
  #         hosts:
  #           - api.example.com
  #         ports:
  #           - number: 443
  #             name: https
  #             protocol: HTTPS
  #         location: MESH_EXTERNAL
  #         resolution: DNS
  #
  # Example with Istio Sidecar (configure sidecar proxy):
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     sidecars:
  #       - name: restrict-egress
  #         # namespace defaults to Release.Namespace
  #         workloadSelector:
  #           labels:
  #             app: my-app
  #         egress:
  #           - hosts:
  #               - "./*"  # Same namespace
  #               - "istio-system/*"  # istio-system namespace
  #
  # Example with Istio WorkloadEntry (add VM workloads to mesh):
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     workloadEntries:
  #       - name: vm-workload
  #         # namespace defaults to Release.Namespace
  #         address: 192.168.1.100
  #         ports:
  #           http: 8080
  #         labels:
  #           app: vm-app
  #
  # Example with Istio WorkloadGroup (template for VM workloads):
  # gatewayApi:
  #   enabled: true
  #   istio:
  #     workloadGroups:
  #       - name: vm-group
  #         # namespace defaults to Release.Namespace
  #         metadata:
  #           labels:
  #             app: vm-app
  #         template:
  #           ports:
  #             http: 8080
  #
  # Example with Istio RequestAuthentication (JWT authentication):
