{{- if .Values.podMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "base.fullname" . }}
  labels:
    {{- include "base.labels" . | nindent 4 }}
spec:
  podMetricsEndpoints:
  - interval: {{ .Values.podMonitor.interval }}
    path: {{ .Values.podMonitor.path }}
    port: {{ .Values.podMonitor.targetPortName | quote }}
    {{- with .Values.podMonitor.authorization }}
    authorization: {{ toYaml . | nindent 6 }}
    {{- end }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "base.labels" . | nindent 6 }}
{{- end }}
