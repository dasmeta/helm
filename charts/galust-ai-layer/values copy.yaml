imagePullSecret:
  create: false
  name: ecr-secret
  annotations: {}
  dockerConfigJson: ""
  dockerConfigJsonBase64: ""

imagePullSecrets: &galustImagePullSecrets
  - name: ecr-secret

gatewayApi:
  enabled: false

zeroTrustMesh:
  enabled: false

backend:
  enabled: true
  gatewayApi:
    enabled: false
  zeroTrustMesh:
    enabled: false
  fullnameOverride: ai-layer-strapi
  version: 0.1.0
  appVersion: 0.1.0
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-backend
    tag: latest
    pullPolicy: Always
  imagePullSecrets: *galustImagePullSecrets
  replicaCount: 1
  containerPort: 1337
  service:
    type: ClusterIP
    port: 1337
  persistence:
    uploads:
      enabled: true
      claimName: ai-layer-strapi-uploads
      size: 20Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: ""
      keepPvc: true
  storage:
    - persistentVolumeClaimName: ai-layer-strapi-uploads
      accessModes:
        - ReadWriteOnce
      requestedSize: 20Gi
      keepPvc: true
  volumes:
    - name: strapi-uploads
      persistentVolumeClaim:
        claimName: ai-layer-strapi-uploads
      mountPath: /opt/app/public/uploads
  resources:
    limits:
      cpu: 1500m
      memory: 1500Mi
    requests:
      cpu: 1000m
      memory: 1000Mi
  securityContext:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
  envFrom:
    secret: ai-layer-strapi
  config:
    PORT: "1337"
    DATABASE_CLIENT: postgres
    DATABASE_PORT: "5432"
    DATABASE_NAME: strapi
    DATABASE_USERNAME: strapi
    STRAPI_DISABLE_UPDATE_NOTIFICATION: "true"
    FAST_REFRESH: "false"
    EXTRA_ARGS: ""
    ADMIN_URL: https://api.galust.ai/admin
    APP_HOST: 0.0.0.0
    APP_URL: https://api.galust.ai/admin
    BACKEND_URL: https://api.galust.ai
    ENV: production
    HOST: 0.0.0.0
    NODE_ENV: production
    PUBLIC_URL: https://api.galust.ai
    STRAPI_ADMIN_BACKEND_URL: https://api.galust.ai
    EVENT_MANAGER_BACKEND_HOST: http://event-manager.em.svc.cluster.local
  extraEnv:
    DATABASE_HOST:
      secretKeyRef:
        name: cnpg-main-urls
        key: host
    DATABASE_PASSWORD:
      secretKeyRef:
        name: cnpg-main-user
        key: password
  ingress:
    enabled: false
    class: nginx
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: api.galust.ai
        paths:
          - path: /
            pathType: Prefix
            backend:
              servicePort: 1337
    tls:
      - secretName: com-galust-api-tls2
        hosts:
          - api.galust.ai

mcp:
  enabled: true
  gatewayApi:
    enabled: false
  zeroTrustMesh:
    enabled: false
  fullnameOverride: ai-layer-mcp
  version: 0.0.1
  appVersion: 0.0.1
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-mcp
    tag: latest
    pullPolicy: Always
  imagePullSecrets: *galustImagePullSecrets
  replicaCount: 1
  labels:
    version:
      name: app-version
      value: v0.0.1
    app:
      name: app
      value: ai-layer-mcp
  service:
    type: ClusterIP
    port: 4002
  containerPort: 4002
  envFrom:
    secret: ai-layer-mcp
  config:
    DEBUG_MCP_HEADER_FLOW: "true"
    OPENAPI_BASE_URL: http://ai-layer-strapi.ai-layer.svc.cluster.local:1337/api
    OPENAPI_SPEC_URL: http://ai-layer-strapi.ai-layer.svc.cluster.local:1337/documentation/openapi.json
  ingress:
    enabled: false
    class: nginx
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: mcp.galust.ai
        paths:
          - path: /
            pathType: Prefix
            backend:
              servicePort: 4002
    tls:
      - secretName: com-galust-mcp-tls2
        hosts:
          - mcp.galust.ai

mcpUseCase:
  enabled: true
  gatewayApi:
    enabled: false
  zeroTrustMesh:
    enabled: false
  fullnameOverride: ai-layer-mcp-use-case
  version: 0.0.1
  appVersion: 0.0.1
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-mcp-use-case
    tag: latest
    pullPolicy: Always
  imagePullSecrets: *galustImagePullSecrets
  replicaCount: 1
  labels:
    version:
      name: app-version
      value: v0.0.1
    app:
      name: app
      value: ai-layer-mcp-use-case
  service:
    type: ClusterIP
    port: 4002
  containerPort: 4002
  envFrom:
    secret: ai-layer-mcp-use-case
  config:
    DEBUG_MCP_HEADER_FLOW: "true"
    TOOLS_CATALOG_URL: https://api.galust.ai
    ORCHESTRATOR_ENDPOINT: http://ai-layer-orchestrator:3000/api/galust/ask

orchestrator:
  enabled: true
  gatewayApi:
    enabled: false
  zeroTrustMesh:
    enabled: false
  fullnameOverride: ai-layer-orchestrator
  version: 0.0.1
  appVersion: 0.0.1
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-orchestrator
    tag: latest
    pullPolicy: Always
  imagePullSecrets: *galustImagePullSecrets
  replicaCount: 1
  labels:
    version:
      name: app-version
      value: v0.0.1
    app:
      name: app
      value: ai-layer-orchestrator
  service:
    type: ClusterIP
    port: 3000
  containerPort: 3000
  resources:
    requests:
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
  envFrom:
    secret: ai-layer-orchestrator
  config:
    NODE_ENV: production
    OPENAI_MODEL: gpt-4o-mini
    QDRANT_URL: http://qdrant.dasmeta-customer-portal.svc.cluster.local:6333
    REDIS_URL: redis://redis:6379/0
    LANGFUSE_HOST: https://cloud.langfuse.com
    GLOBAL_PREFIX: orchestrator
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://localhost:4318/v1/traces
    AI_LAYER_BACKEND_URL: http://ai-layer-strapi:1337
  ingress:
    enabled: false
    class: nginx
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: https://app.galust.ai
      nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
      nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
      nginx.ingress.kubernetes.io/cors-allow-headers: Authorization, Content-Type, Origin, Accept, X-Requested-With, MCP-Protocol-Version, Mcp-Session-Id
    hosts:
      - host: api.galust.ai
        paths:
          - path: /orchestrator
            pathType: Prefix
            backend:
              servicePort: 3000
    tls:
      - clusterIssuer: letsencrypt-prod
        secretName: com-galust-api-tls2
        hosts:
          - api.galust.ai
