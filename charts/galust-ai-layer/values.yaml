imagePullSecret:
  create: false
  name: ecr-secret
  annotations: {}
  dockerConfigJson: ""
  dockerConfigJsonBase64: ""

# Do not use YAML anchors for this list. Helm stores release values as JSON;
# a shared anchor makes every component point at the same slice and install fails with:
# "json: unsupported value: encountered a cycle via map[string]interface {}".
imagePullSecrets:
  - name: ecr-secret

ecrCredentialsRefresh:
  enabled: false
  schedule: "0 */6 * * *"
  registry: 565580475168.dkr.ecr.eu-central-1.amazonaws.com
  region: eu-central-1
  secretName: ecr-secret
  image:
    repository: alpine
    tag: "3.20"
    pullPolicy: IfNotPresent
  awsCredentialsSecret:
    name: ""
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  resources: {}

global:
  API_URL: &apiUrl https://api.galust.ai
  API_HOST: &apiHost api.galust.ai
  APP_URL: &appUrl https://app.galust.ai
  MCP_URL: &mcpUrl https://mcp.galust.ai
  MCP_HOST: &mcpHost mcp.galust.ai
  ADMIN_URL: &adminUrl https://api.galust.ai/admin
  OPENAPI_BASE_URL: &openapiBaseUrl https://api.galust.ai/api
  OPENAPI_SPEC_URL: &openapiSpecUrl https://api.galust.ai/documentation/openapi.json
  ORCHESTRATOR_ENDPOINT: &orchestratorEndpoint https://api.galust.ai/orchestrator/api/galust/ask

gatewayApi:
  enabled: false

zeroTrustMesh:
  enabled: false

# Strapi backend (TrueCharts: oci://oci.trueforge.org/truecharts/strapi)
backend:
  enabled: true
  global:
    fullnameOverride: ai-layer-strapi
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-backend
    tag: latest
    pullPolicy: Always
  imagePullSecrets:
    - name: ecr-secret
  service:
    main:
      ports:
        main:
          port: 1337
  persistence:
    data:
      enabled: true
      mountPath: /opt/app/public/uploads
  cnpg:
    main:
      enabled: true
      user: strapi
      database: strapi
      monitoring:
        enablePodMonitor: true
      cluster:
        instances: 2
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        storage:
          size: "20Gi"
        walStorage:
          size: "20Gi"
        postgresql:
          max_connections: "300"
          logging_collector: "on"
          log_min_duration_statement: "500ms"
          log_statement: "none"
          shared_buffers: "1GB"
          work_mem: "8MB"
          effective_cache_size: "4GB"
          maintenance_work_mem: "128MB"
          bgwriter_lru_maxpages: "1000"
          bgwriter_lru_multiplier: "4.0"
          checkpoint_timeout: "15min"
          max_wal_size: "2GB"
          checkpoint_completion_target: "0.9"
          autovacuum_max_workers: "3"
          autovacuum_naptime: "30s"
          autovacuum_vacuum_cost_limit: "2000"
  resources:
    limits:
      cpu: 1500m
      memory: 1500Mi
    requests:
      cpu: 1000m
      memory: 1000Mi
  portal:
    open:
      enabled: true
  securityContext:
    container:
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      runAsUser: 0
      runAsGroup: 0
  workload:
    main:
      podSpec:
        containers:
          main:
            envFrom:
              - secretRef:
                  name: ai-layer-strapi
                  expandObjectName: false
            env:
              PORT: "{{ .Values.service.main.ports.main.port }}"
              DATABASE_CLIENT: postgres
              DATABASE_PORT: 5432
              DATABASE_NAME: "{{ .Values.cnpg.main.database }}"
              DATABASE_HOST:
                secretKeyRef:
                  name: cnpg-main-urls
                  key: host
              DATABASE_USERNAME: "{{ .Values.cnpg.main.user }}"
              DATABASE_PASSWORD:
                secretKeyRef:
                  name: cnpg-main-user
                  key: password
              STRAPI_DISABLE_UPDATE_NOTIFICATION: true
              FAST_REFRESH: false
              EXTRA_ARGS: ""
              ADMIN_URL: *adminUrl
              APP_HOST: 0.0.0.0
              APP_URL: *adminUrl
              BACKEND_URL: *apiUrl
              ENV: production
              HOST: 0.0.0.0
              NODE_ENV: production
              PUBLIC_URL: *apiUrl
              STRAPI_ADMIN_BACKEND_URL: *apiUrl

mcp:
  enabled: true
  gatewayApi:
    enabled: false
  zeroTrustMesh:
    enabled: false
    allowTo: []
  fullnameOverride: ai-layer-mcp
  version: 0.0.1
  appVersion: 0.0.1
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-mcp
    tag: latest
    pullPolicy: Always
  imagePullSecrets:
    - name: ecr-secret
  replicaCount: 1
  labels:
    version:
      name: app-version
      value: v0.0.1
    app:
      name: app
      value: ai-layer-mcp
  service:
    type: ClusterIP
    port: 4002
  containerPort: 4002
  envFrom:
    secret: ai-layer-mcp
  config:
    DEBUG_MCP_HEADER_FLOW: "true"
    OPENAPI_BASE_URL: *openapiBaseUrl
    OPENAPI_SPEC_URL: *openapiSpecUrl

mcpUseCase:
  enabled: true
  gatewayApi:
    enabled: false
  zeroTrustMesh:
    enabled: false
    allowTo: []
  fullnameOverride: ai-layer-mcp-use-case
  version: 0.0.1
  appVersion: 0.0.1
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-mcp-use-case
    tag: latest
    pullPolicy: Always
  imagePullSecrets:
    - name: ecr-secret
  replicaCount: 1
  labels:
    version:
      name: app-version
      value: v0.0.1
    app:
      name: app
      value: ai-layer-mcp-use-case
  service:
    type: ClusterIP
    port: 4002
  containerPort: 4002
  envFrom:
    secret: ai-layer-mcp-use-case
  config:
    DEBUG_MCP_HEADER_FLOW: "true"
    DEBUG_MCP_USE_CASE: "true"
    DEBUG_MCP_USE_CASE_API: "true"
    DEBUG_MCP_TOOL_CALL_HEADERS: "true"
    AI_LAYER_BACKEND_URL: *apiUrl
    ORCHESTRATOR_ENDPOINT: *orchestratorEndpoint

mcpProducts:
  enabled: true
  gatewayApi:
    enabled: false
  zeroTrustMesh:
    enabled: false
    allowTo: []
  fullnameOverride: ai-layer-mcp-products
  version: 0.0.1
  appVersion: 0.0.1
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-mcp-products
    tag: latest
    pullPolicy: Always
  imagePullSecrets:
    - name: ecr-secret
  replicaCount: 1
  labels:
    version:
      name: app-version
      value: v0.0.1
    app:
      name: app
      value: ai-layer-mcp-products
  service:
    type: ClusterIP
    port: 4002
  containerPort: 4002
  envFrom:
    secret: ai-layer-mcp-products
  config:
    NODE_ENV: production
    DEBUG_MCP_HEADER_FLOW: "true"
    DEBUG_MCP_PRODUCTS: "true"
    DEBUG_MCP_PRODUCTS_API: "true"
    AI_LAYER_BACKEND_URL: *apiUrl

orchestrator:
  enabled: true
  gatewayApi:
    enabled: false
  zeroTrustMesh:
    enabled: false
    allowTo: []
  fullnameOverride: ai-layer-orchestrator
  version: 0.0.1
  appVersion: 0.0.1
  image:
    repository: 565580475168.dkr.ecr.eu-central-1.amazonaws.com/ai-layer-orchestrator
    tag: latest
    pullPolicy: Always
  imagePullSecrets:
    - name: ecr-secret
  replicaCount: 1
  labels:
    version:
      name: app-version
      value: v0.0.1
    app:
      name: app
      value: ai-layer-orchestrator
  service:
    type: ClusterIP
    port: 3000
  containerPort: 3000
  resources:
    requests:
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
  envFrom:
    # Existing Kubernetes Secret loaded as environment variables by the orchestrator.
    # Override this name when secrets are managed outside this chart under a different name.
    secret: ai-layer-orchestrator
  config:
    NODE_ENV: production
    OPENAI_MODEL: gpt-4o-mini
    LANGFUSE_HOST: https://cloud.langfuse.com
    GLOBAL_PREFIX: orchestrator
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://localhost:4318/v1/traces
    AI_LAYER_BACKEND_URL: *apiUrl
    PORTKEY_PROVIDER: dm-openai
  ingress:
    enabled: true
    class: nginx
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: *appUrl
      nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
      nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
      nginx.ingress.kubernetes.io/cors-allow-headers: Authorization, Content-Type, Origin, Accept, X-Requested-With, MCP-Protocol-Version, Mcp-Session-Id
    hosts:
      - host: *apiHost
        paths:
          - path: /orchestrator
            pathType: Prefix
            backend:
              servicePort: 3000
    tls:
      - clusterIssuer: letsencrypt-prod
        secretName: com-galust-api-tls2
        hosts:
          - *apiHost
