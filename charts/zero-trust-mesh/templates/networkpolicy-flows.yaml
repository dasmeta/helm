{{- $np := .Values.networkPolicy | default (dict) -}}
{{- $labels := .Values.labels | default (dict) -}}
{{- if and (default true $np.enabled) .Values.allowTo }}
{{- $sourceNamespace := include "ztm.workloadNamespace" . -}}
{{- $sourceWorkload := include "ztm.workloadName" . -}}
{{- range .Values.allowTo }}
{{- if .service }}
{{- $targetNamespace := default $sourceNamespace .namespace -}}
{{- $ruleName := printf "%s-to-%s-%v" $sourceWorkload .service (.port | default 8080) -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-{{ include "ztm.sanitizeName" $ruleName }}
  namespace: {{ $targetNamespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .service }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{ default "kubernetes.io/metadata.name" $labels.namespaceLabelKey }}: {{ $sourceNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $sourceWorkload }}
      ports:
        - port: {{ .port | default 8080 }}
          protocol: {{ .protocol | default "TCP" }}
{{ end }}
{{ end }}
{{- end }}
