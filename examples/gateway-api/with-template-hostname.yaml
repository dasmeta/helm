# helm diff upgrade --install -n istio-system with-template-hostname ./charts/gateway-api -f ./examples/gateway-api/with-template-hostname.yaml
global:
  environment: dev
httpRoutes:
  - parentRefs:
      - name: main
        sectionName: http-echo-gw-http
    hostnames:
      - "{{ .Values.global.environment }}.http-echo-gw.localhost"
      # - "http-echo-gw.localhost"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /restricted
        directResponse:
          status: 403
      - matches:
          - path:
              type: PathPrefix
              value: /my-path
        directResponse:
          status: 200
          body: "Hello, World!"
      - matches:
          - path:
              type: PathPrefix
              value: /empty
        directResponse:
          status: 429
      - matches:
          - path:
              type: PathPrefix
              value: /custom-502
        directResponse:
          status: 502
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - name: "{{ .Values.global.environment }}.api-v1"
            port: 80
